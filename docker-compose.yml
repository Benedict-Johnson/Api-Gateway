services:
  gateway:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-my-super-secret-key}
      - API_KEY_SECRET=${API_KEY_SECRET:-secret123}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/gateway}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_TLS=${ENABLE_TLS:-false}
    volumes:
      - .:/app
    depends_on:
      - service-a
      - service-b
      - redis
      - postgres

  service-a:
    build:
      context: .
      dockerfile: docker/service-a/Dockerfile
    container_name: service-a
    ports:
      - "${SERVICE_A_PORT:-8001}:8001"
    environment:
      - API_KEY_SECRET=${API_KEY_SECRET:-secret123}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - .:/app

  service-b:
    build:
      context: .
      dockerfile: docker/service-b/Dockerfile
    container_name: service-b
    ports:
      - "${SERVICE_B_PORT:-8002}:8002"
    environment:
      - API_KEY_SECRET=${API_KEY_SECRET:-secret123}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  postgres:
    image: postgres:16-alpine
    container_name: gateway-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: gateway-prometheus
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: gateway-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data: